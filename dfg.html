  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 3em;
      letter-spacing: 2px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff9, 0 0 20px #ff9; }
      to { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      padding: 10px 20px;
      border: 2px solid #fff;
      border-radius: 25px;
      transition: 0.3s;
    }

    nav a:hover {
      background: #fff;
      color: #2a5298;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.2);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
